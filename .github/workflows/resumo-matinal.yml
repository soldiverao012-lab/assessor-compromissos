name: Resumo Matinal

on:
  schedule:
    # 07:00 no horário de Brasília (UTC-3) = 10:00 UTC.
    - cron: "0 10 * * *"
  workflow_dispatch:        # botão pra testar na hora

concurrency:
  group: assessor-resumo
  cancel-in-progress: false

jobs:
  resumo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Preparar credencial do Google
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > google_credentials.json

      - name: Enviar resumo do dia
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_FILE: google_credentials.json
        run: python assessor.py --resumo
